services:
  tests-ci:
    image: client-tests
    build:
      context: ../..
      dockerfile: packages/client/Dockerfile
    volumes:
      - ../../playwright-report/client:/app/playwright-report/client
  tests-local:
    image: client-tests
    ports:
      - "5110:5110"
    volumes:
      - ./__tests__:/app/packages/client/__tests__
      - ./playwright.config.ts:/app/packages/client/playwright.config.ts
      - ../../playwright-report/client:/app/playwright-report/client
  # Dev mode: mount source code so you can iterate without rebuilding the image.
  # Rebuilds dist inside the container on each run.
  # Usage:
  #   docker-compose run --rm tests-dev pnpm exec playwright test
  #   docker-compose run --rm tests-dev pnpm exec playwright test __tests__/profile.spec.ts
  #   docker-compose run --rm tests-dev pnpm exec playwright test --update-snapshots
  tests-dev:
    image: client-tests
    ports:
      - "5110:5110"
    entrypoint: ["/bin/bash", "/app/packages/client/dev-entrypoint.sh"]
    volumes:
      # Source code — edit on host, rebuilt inside container
      - ../../packages/client/src:/app/packages/client/src
      - ../../packages/client/public:/app/packages/client/public
      - ../../packages/client/vite.config.ts:/app/packages/client/vite.config.ts
      - ../../packages/client/index.html:/app/packages/client/index.html
      - ../../packages/client/tsconfig.json:/app/packages/client/tsconfig.json
      - ../../packages/client/scripts:/app/packages/client/scripts
      - ../../packages/client/dev-entrypoint.sh:/app/packages/client/dev-entrypoint.sh
      # Shared sources
      - ../../packages/shared/api:/app/packages/shared/api
      - ../../packages/shared/components:/app/packages/shared/components
      - ../../packages/shared/constants:/app/packages/shared/constants
      - ../../packages/shared/dialogs:/app/packages/shared/dialogs
      - ../../packages/shared/enums:/app/packages/shared/enums
      - ../../packages/shared/hooks:/app/packages/shared/hooks
      - ../../packages/shared/pages:/app/packages/shared/pages
      - ../../packages/shared/selectors:/app/packages/shared/selectors
      - ../../packages/shared/skeletons:/app/packages/shared/skeletons
      - ../../packages/shared/store:/app/packages/shared/store
      - ../../packages/shared/themes:/app/packages/shared/themes
      - ../../packages/shared/types:/app/packages/shared/types
      - ../../packages/shared/utils:/app/packages/shared/utils
      # UI-kit sources
      - ../../libs/ui-kit/components:/app/libs/ui-kit/components
      - ../../libs/ui-kit/assets:/app/libs/ui-kit/assets
      - ../../libs/ui-kit/constants:/app/libs/ui-kit/constants
      - ../../libs/ui-kit/context:/app/libs/ui-kit/context
      - ../../libs/ui-kit/enums:/app/libs/ui-kit/enums
      - ../../libs/ui-kit/hooks:/app/libs/ui-kit/hooks
      - ../../libs/ui-kit/styles:/app/libs/ui-kit/styles
      - ../../libs/ui-kit/types:/app/libs/ui-kit/types
      - ../../libs/ui-kit/utils:/app/libs/ui-kit/utils
      # Public assets (fonts, images, scripts)
      - ../../public:/app/public
      # Tests, mocks, config
      - ./__tests__:/app/packages/client/__tests__
      - ../../packages/shared/__mocks__:/app/packages/shared/__mocks__
      - ./playwright.config.ts:/app/packages/client/playwright.config.ts
      # Reports output
      - ../../playwright-report/client:/app/playwright-report/client
